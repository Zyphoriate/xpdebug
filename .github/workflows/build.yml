name: Build and Release

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-33 build-tools;33.0.0"

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "APP_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble release
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          VERSION="${{ env.APP_VERSION }}"
          if [ -z "$VERSION" ]; then
            VERSION="snapshot-${GITHUB_SHA::7}"
          fi
          VERSION="${VERSION#v}"
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             "xposed-debug-${VERSION}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: xposed-debug-apk
          path: xposed-debug-*.apk

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: xposed-debug-apk

      - name: Get version
        id: version
        run: |
          V="${GITHUB_REF#refs/tags/}"
          echo "name=${V#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.name }}
          tag_name: ${{ github.ref_name }}
          files: xposed-debug-*.apk
          generate_release_notes: true
